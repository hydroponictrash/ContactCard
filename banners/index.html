<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>HydroponicTrash Dynamic Layout</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root {
      color-scheme: dark;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle at top, #020617, #000000 65%);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #root {
      position: relative;
      width: min(960px, 100vw - 32px);
      height: min(540px, 100vh - 32px);
      border-radius: 24px;
      background: rgba(15, 23, 42, 0.95);
      box-shadow:
        0 0 40px rgba(15, 23, 42, 0.9),
        0 0 80px rgba(0, 255, 157, 0.35);
      overflow: hidden;
      padding: 24px;
    }

    .block {
      position: absolute;
      color: #e5e7eb;
    }

    .headline-char {
      display: inline-block;
      color: #00ff9d;
      text-shadow: 0 0 12px rgba(0, 255, 157, 0.8);
      animation: wave 1.4s ease-in-out infinite;
      animation-delay: calc(var(--i) * 0.06s);
    }

    .body-line {
      white-space: pre;
    }

    .pill {
      position: absolute;
      right: 24px;
      top: 24px;
      padding: 0.35rem 0.9rem;
      border-radius: 999px;
      border: 1px solid rgba(0, 255, 157, 0.5);
      color: #a5b4fc;
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      background: linear-gradient(120deg, rgba(15, 23, 42, 0.9), rgba(15, 23, 42, 0.2));
      backdrop-filter: blur(12px);
    }

    @keyframes wave {
      0%, 100% { transform: translateY(0) scale(1); }
      50%      { transform: translateY(-8px) scale(1.05); }
    }

      position: absolute;
      left: 24px;
